<div class="login-page">
  <div class="login-wrapper">

    <div class="login-card">

      <!-- Brand Header -->
      <div class="brand-header">
        <div class="brand-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5"/>
            <path d="M14 6L17.5 11H22L18 15.5L19.5 21L14 18L8.5 21L10 15.5L6 11H10.5L14 6Z"
                  fill="currentColor" opacity="0.9"/>
          </svg>
        </div>
        <h1 class="brand-name">Digital Gold Wallet</h1>
        <p class="brand-tagline">Sign in to your account</p>
      </div>

      <!-- Error Alert -->
      <div
        *ngIf="errorMessage"
        class="alert alert-danger alert-dismissible d-flex align-items-start gap-2"
        role="alert"
        aria-live="polite"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="flex-shrink-0 mt-1" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ errorMessage }}</span>
        <button
          type="button"
          class="btn-close ms-auto"
          aria-label="Dismiss error"
          (click)="errorMessage = null"
        ></button>
      </div>

      <!-- Login Form -->
      <form
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
        novalidate
        autocomplete="on"
      >

        <!-- Email Field -->
        <div class="form-group mb-4">
          <label for="email" class="form-label">Email address</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="form-control input-with-icon"
              [class.is-invalid]="isEmailInvalid"
              [class.is-valid]="email.valid && email.touched"
              placeholder="you@example.com"
              autocomplete="email"
              aria-describedby="emailError"
              aria-required="true"
            />
          </div>

          <div id="emailError" class="invalid-feedback" *ngIf="isEmailInvalid">
            <span *ngIf="email.errors?.['required']">Email is required.</span>
            <span *ngIf="email.errors?.['email'] && !email.errors?.['required']">
              Please enter a valid email address.
            </span>
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label mb-0">Password</label>
          </div>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                   viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="form-control input-with-icon input-with-toggle"
              [class.is-invalid]="isPasswordInvalid"
              [class.is-valid]="password.valid && password.touched"
              placeholder="Enter your password"
              autocomplete="current-password"
              aria-describedby="passwordError"
              aria-required="true"
            />
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              [attr.aria-pressed]="showPassword"
              tabindex="0"
            >
              <!-- Eye Open -->
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg"
                   width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye Closed -->
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg"
                   width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                         a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                         a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>

          <div id="passwordError" class="invalid-feedback" *ngIf="isPasswordInvalid">
            <span *ngIf="password.errors?.['required']">Password is required.</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn btn-primary w-100 submit-btn"
          [disabled]="loginForm.invalid || isLoading"
          aria-label="Sign in to your account"
        >
          <span *ngIf="!isLoading">Sign in</span>
          <span *ngIf="isLoading" class="d-flex align-items-center justify-content-center gap-2">
            <span
              class="spinner-border spinner-border-sm"
              role="status"
              aria-hidden="true"
            ></span>
            <span>Signing in...</span>
          </span>
        </button>

      </form>

      <!-- Footer Link -->
      <p class="register-prompt">
        Don't have an account?
        <a routerLink="/auth/register" class="register-link">Create one</a>
      </p>

    </div>
  </div>
</div>
